services:
  # Banco de Dados (PostgreSQL)
  db:
    image: postgres:17
    restart: always
    container_name: pg_route_db
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_route_data:/var/lib/postgresql/data
    networks:
      - route_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mensageria/Fila (Redis)
  redis:
    image: redis:7-alpine
    container_name: routes_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - route_redis_data:/data
    networks:
      - route_network
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço da API
  api_route:
    build: .
    container_name: route_fastapi
    ports:
      - "8003:8000"
    env_file:
      - .env
    networks:
      - route_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers

  # Serviço do Worker
  worker:
    build: .
    container_name: route_worker
    command: python sync_worker.py
    env_file:
      - .env
    networks:
      - route_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

# Volume para os dados do Postgres não sumirem quando o container parar
volumes:
  pg_route_data:
  route_redis_data:

networks:
  route_network:
    external: true
